server {
    listen 80;
    server_name localhost;
    resolver 127.0.0.11 valid=5s;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json image/svg+xml application/wasm font/woff2;
    gzip_disable "MSIE [1-6]\.";

    # Vite emits content-hashed filenames under /assets — they are immutable, so cache
    # them for a year. Repeat visits skip re-downloading ~2.2 MB of JS/CSS.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Prevent browser from caching the SPA shell (index.html) so it always
    # loads the freshest hashed JS/CSS assets.
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # If the file being served is index.html, never cache it.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /api/translate {
        set $translate_upstream http://libretranslate:5000;
        rewrite ^/api/translate(.*) /translate$1 break;
        proxy_pass $translate_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Model loading + translation can be slow on first use.
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Long-running LLM endpoints (planet profile / uncertainty synthesis) — CPU
    # inference can take several minutes, so allow a generous read timeout.
    location ~ ^/api/exoplanets/(summary|uncertainty) {
        set $api_upstream http://exopaperrag.api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /api/ {
        set $api_upstream http://exopaperrag.api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /hubs/ {
        set $api_upstream http://exopaperrag.api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
