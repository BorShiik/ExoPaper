

services:
  ravendb-a:
    image: ravendb/ravendb:latest
    container_name: exopaper_db_a
    environment:
      - RAVEN_Setup_Mode=None
      - RAVEN_License_Eula_Accepted=true
      - RAVEN_Security_UnsecuredAccessAllowed=PublicNetwork
      - RAVEN_ServerUrl=http://0.0.0.0:8080
      - RAVEN_ServerUrl_Tcp=tcp://0.0.0.0:38888
      - RAVEN_PublicServerUrl=http://localhost:8080
      - RAVEN_PublicServerUrl_Tcp=tcp://ravendb-a:38888
    ports:
      - "8080:8080"      
      - "38888:38888"    
    volumes:
      - ravendb_data_a:/opt/RavenDB/Server/RavenData

  ravendb-b:
    image: ravendb/ravendb:latest
    container_name: exopaper_db_b
    environment:
      - RAVEN_Setup_Mode=None
      - RAVEN_License_Eula_Accepted=true
      - RAVEN_Security_UnsecuredAccessAllowed=PublicNetwork
      - RAVEN_ServerUrl=http://0.0.0.0:8080
      - RAVEN_ServerUrl_Tcp=tcp://0.0.0.0:38888
      - RAVEN_PublicServerUrl=http://localhost:8081
      - RAVEN_PublicServerUrl_Tcp=tcp://ravendb-b:38888
    ports:
      - "8081:8080"      
      - "38889:38888"    
    volumes:
      - ravendb_data_b:/opt/RavenDB/Server/RavenData

  ravendb-c:
    image: ravendb/ravendb:latest
    container_name: exopaper_db_c
    environment:
      - RAVEN_Setup_Mode=None
      - RAVEN_License_Eula_Accepted=true
      - RAVEN_Security_UnsecuredAccessAllowed=PublicNetwork
      - RAVEN_ServerUrl=http://0.0.0.0:8080
      - RAVEN_ServerUrl_Tcp=tcp://0.0.0.0:38888
      - RAVEN_PublicServerUrl=http://localhost:8082
      - RAVEN_PublicServerUrl_Tcp=tcp://ravendb-c:38888
    ports:
      - "8082:8080"      
      - "38890:38888"    
    volumes:
      - ravendb_data_c:/opt/RavenDB/Server/RavenData

  ollama:
    image: ollama/ollama:latest
    container_name: exopaper_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: exopaper_ollama_init
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama to start..."
        sleep 10
        echo "Pulling nomic-embed-text..."
        ollama pull nomic-embed-text
        echo "Pulling llama3:8b..."
        ollama pull llama3:8b
        echo "All models pulled successfully!"
    environment:
      - OLLAMA_HOST=http://ollama:11434

  exopaperrag.api:
    image: ${DOCKER_REGISTRY-}exopaperragapi
    container_name: exopaper_api
    build:
      context: .
      dockerfile: ExoPaperRAG.Api/Dockerfile
    depends_on:
      - ravendb-a
      - ravendb-b
      - ravendb-c
      - ollama
    ports:
      - "5000:8080"      
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RavenSettings__Urls__0=http://ravendb-a:8080
      - RavenSettings__Urls__1=http://ravendb-b:8080
      - RavenSettings__Urls__2=http://ravendb-c:8080
      - RavenSettings__DatabaseName=ExoPaper
      - OllamaSettings__BaseUrl=http://ollama:11434
      - OllamaSettings__EmbeddingModel=nomic-embed-text
      - OllamaSettings__GenerationModel=llama3:8b

  exopaper-ui:
    image: exopaper-ui:latest
    container_name: exopaper_ui
    build:
      context: ./ExoPaper.UI
      dockerfile: Dockerfile
    depends_on:
      - exopaperrag.api
    ports:
      - "3000:80"

volumes:
  ravendb_data_a:
  ravendb_data_b:
  ravendb_data_c:
  ollama_data: