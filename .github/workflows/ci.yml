name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore ExoPaperRAG.sln

      - name: Build
        run: dotnet build ExoPaperRAG.sln -c Release --no-restore

      - name: Test
        run: dotnet test ExoPaperRAG.sln -c Release --no-build --verbosity normal

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ExoPaper.UI
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ExoPaper.UI/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
